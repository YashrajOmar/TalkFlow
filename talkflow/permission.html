<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TalkFlow - Microphone Access</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0b0f19;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
      gap: 1rem;
    }
    .icon { font-size: 3.5rem; }
    h2 { color: #06b6d4; font-size: 1.2rem; font-weight: 600; }
    p { color: #94a3b8; font-size: 0.9rem; line-height: 1.6; max-width: 300px; }
    .hint {
      background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.35);
      border-radius: 8px;
      padding: 0.7rem 1rem;
      font-size: 0.85rem;
      color: #a5b4fc;
      max-width: 300px;
    }
    #status {
      font-size: 0.9rem;
      color: #94a3b8;
      min-height: 1.4em;
      transition: color 0.2s;
    }
    #status.success { color: #34d399; }
    #status.error   { color: #f87171; }
  </style>
</head>
<body>
  <div class="icon">🎤</div>
  <h2>TalkFlow Needs Microphone Access</h2>
  <p>Click <strong>Allow</strong> when Chrome asks for microphone permission.</p>
  <div class="hint">👆 Look for a permission dialog at the top of this window</div>
  <div id="status">Requesting permission…</div>
  <script src="permission.js"></script>
</body>
</html>
